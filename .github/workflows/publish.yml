name: Publish release

on:
  release:
    types: [ published ]

jobs:
  publish-release:
    name: Publish nanoid-kotlin Artifacts
    runs-on: macos-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Set up Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          java-package: jdk
          cache: 'gradle'
          check-latest: false

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Decode GPG Key
        run: |
          mkdir -p ~/.gradle/
          echo "${{secrets.SIGNING_SECRET_KEY_RING_FILE}}" > ~/.gradle/secring.gpg.b64
          base64 --decode ~/.gradle/secring.gpg.b64 > ~/.gradle/secring.gpg

      - name: Publish to Maven Central Portal (release stays manual)
        run: ./gradlew publishToMavenCentral -Psigning.keyId=${{secrets.SIGNING_KEY_ID}} -Psigning.password='${{secrets.SIGNING_PASSWORD}}' -Psigning.secretKeyRingFile=$(echo ~/.gradle/secring.gpg) --warn --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{secrets.OSSRH_USERNAME}}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{secrets.OSSRH_PASSWORD}}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-libs
          path: build/libs
          retention-days: 90
